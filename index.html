<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tykeoons MoneySmarts Curriculum Integration Planner</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main id="app">
    <section class="shell">
      <header class="topbar">
        <img src="assets/tykeoons-logo.png" alt="Tykeoons" class="logo">
        <div>
          <p class="eyebrow">MoneySmarts curriculum integration</p>
          <h1>Build a school-ready delivery plan</h1>
        </div>
      </header>

      <section class="workspace">
        <form id="plannerForm" class="controls">
          <div class="field">
            <label for="schoolName">School name</label>
            <input id="schoolName" name="schoolName" type="text" placeholder="e.g. Maple Grove Primary">
          </div>

          <div class="field">
            <label for="mathsScheme">Maths scheme or approach</label>
            <select id="mathsScheme" name="mathsScheme">
              <option value="custom-maths">No scheme / custom maths timings</option>
            </select>
          </div>

          <div id="customMaths" class="custom-panel" hidden></div>

          <div class="field">
            <label for="psheScheme">PSHE scheme or approach</label>
            <select id="psheScheme" name="psheScheme">
              <option value="custom-pshe">No scheme / custom PSHE timings</option>
            </select>
          </div>

          <div id="customPshe" class="custom-panel" hidden></div>

          <fieldset class="fieldset">
            <legend>Implementation year groups</legend>
            <div id="yearGroupChecks" class="checks"></div>
          </fieldset>

          <div class="field">
            <label for="attainment">Pupils are generally achieving</label>
            <select id="attainment" name="attainment">
              <option value="at">At national expectations</option>
              <option value="below">Below national expectations</option>
              <option value="above">Above national expectations</option>
            </select>
          </div>

          <label class="toggle">
            <input id="allowOtherSubjects" name="allowOtherSubjects" type="checkbox">
            <span>Allow recommendations outside PSHE/maths where there is a stronger fit</span>
          </label>

          <div class="actions">
            <button type="submit" class="primary">Generate plan</button>
            <button id="printBtn" type="button" class="secondary">Print / save PDF</button>
          </div>
        </form>

        <section class="results" aria-live="polite">
          <div class="report-header">
            <div>
              <p class="eyebrow">Generated plan</p>
              <h2 id="reportTitle">Tykeoons MoneySmarts placement plan</h2>
            </div>
            <img src="assets/tykeoons-logo-full.png" alt="Tykeoons" class="report-logo">
          </div>

          <div id="summaryCards" class="summary-grid"></div>
          <nav id="optionTabs" class="tabs" aria-label="Plan options"></nav>
          <div id="optionOutput"></div>
        </section>
      </section>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
